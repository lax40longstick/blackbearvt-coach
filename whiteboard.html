<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<meta name="theme-color" content="#7dd3d8">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="BenchBoss Board">
<link rel="manifest" href="./manifest.json">
<link rel="apple-touch-icon" href="./icons/icon-192.png">
<title>BenchBoss Coach Board</title>
<script src="./runtime-config.js"></script>
<script type="module" src="./src/lib/analytics.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=JetBrains+Mono:wght@400;600;700;900&family=Oswald:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0a;--panel:#141414;--panel-hi:#202020;--text:#f3f7f8;--text-mid:#b9c1c6;--text-dim:#8d989e;--border:#2a2a2a;--teal:#7dd3d8;--gold:#f4cf57;--safe-top:env(safe-area-inset-top,0);--safe-bottom:env(safe-area-inset-bottom,0)}*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}html,body{min-height:100%;overscroll-behavior:contain}body{margin:0;background:radial-gradient(circle at 20% 4%,rgba(125,211,216,.13),transparent 35%),var(--bg);color:var(--text);font-family:'JetBrains Mono',monospace;padding:calc(10px + var(--safe-top)) 12px calc(18px + var(--safe-bottom))}.tablet-top{position:sticky;top:0;z-index:20;margin:-10px -12px 12px;padding:calc(10px + var(--safe-top)) 14px 10px;background:rgba(10,10,10,.92);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:10px}.brand{display:flex;gap:10px;align-items:center;color:inherit;text-decoration:none}.mark{width:42px;height:42px;border:2px solid var(--teal);border-radius:14px;display:grid;place-items:center;font-family:'Bebas Neue';font-size:22px;color:var(--teal)}.brand strong{display:block;font-family:'Bebas Neue';font-size:26px;line-height:.9;letter-spacing:1.2px}.brand span{display:block;color:var(--text-dim);font-size:10px;text-transform:uppercase;letter-spacing:1.1px;margin-top:3px}.top-links{display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end}.top-links a,.top-links button{border:1px solid rgba(125,211,216,.35);background:rgba(125,211,216,.08);color:var(--teal);border-radius:999px;padding:10px 12px;text-decoration:none;font-family:inherit;font-size:11px;font-weight:900;text-transform:uppercase;letter-spacing:.8px}main{max-width:1400px;margin:0 auto}.offline-note{margin-bottom:12px;border:1px solid rgba(244,207,87,.35);background:rgba(244,207,87,.08);color:var(--text-mid);border-radius:14px;padding:10px 12px;font-size:11px;line-height:1.4}@media(max-width:700px){.tablet-top{align-items:flex-start}.top-links a,.top-links button{padding:9px 10px;font-size:10px}.brand strong{font-size:22px}}
</style>
</head>
<body data-page="whiteboard">
<header class="tablet-top">
  <a class="brand" href="./coach.html" aria-label="BenchBoss Coach App"><div class="mark">BB</div><div><strong>Coach Board</strong><span>tablet whiteboard</span></div></a>
  <nav class="top-links" aria-label="Coach links">
    <a href="./app.html#practice">Practice</a>
    <a href="./bench.html">Bench</a>
    <a href="./app.html#lines">Lineup</a>
  </nav>
</header>
<main>
  <div class="offline-note">Tip: install BenchBoss to your tablet home screen, preload your practice while online, then use this board at the rink with Apple Pencil/stylus or touch. Sketches save locally and can be attached to the current practice from the full app.</div>
  <div id="whiteboardStandaloneMount"></div>
</main>
<script src="./src/features/whiteboard/coach-whiteboard.js"></script>
<script>
  window.BenchBossWhiteboard?.renderWhiteboardApp('whiteboardStandaloneMount', { standalone: true });
  if ('serviceWorker' in navigator) window.addEventListener('load', () => navigator.serviceWorker.register('./sw.js').catch(() => {}));
</script>
</body>
</html>
