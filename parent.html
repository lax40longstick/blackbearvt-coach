<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="theme-color" content="#7dd3d8">
<title>BenchBoss Parent Portal</title>
<script src="./runtime-config.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=JetBrains+Mono:wght@400;600;700&family=Oswald:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root{--primary:#7dd3d8;--secondary:#f4cf57;--bg:#0a0a0a;--panel:#151515;--panel2:#202020;--text:#f4f7f8;--muted:#9ca3af;--border:#303030}*{box-sizing:border-box}body{margin:0;background:radial-gradient(circle at 20% 5%,rgba(125,211,216,.12),transparent 32%),var(--bg);color:var(--text);font-family:'JetBrains Mono',monospace;padding-bottom:30px}.top{position:sticky;top:0;z-index:5;background:rgba(10,10,10,.92);backdrop-filter:blur(10px);border-bottom:1px solid var(--border);padding:12px 16px;display:flex;justify-content:space-between;align-items:center}.brand{display:flex;gap:10px;align-items:center}.logo{width:42px;height:42px;border:2px solid var(--primary);border-radius:14px;display:grid;place-items:center;color:var(--primary);font-family:'Bebas Neue';font-size:22px;overflow:hidden}.logo img{width:100%;height:100%;object-fit:cover}.brand strong{display:block;font-family:'Bebas Neue';font-size:25px;letter-spacing:1px;line-height:1}.brand span{display:block;color:var(--muted);font-size:10px;text-transform:uppercase;letter-spacing:1px}main{max-width:1100px;margin:0 auto;padding:16px}.hero,section,article{background:rgba(21,21,21,.94);border:1px solid var(--border);border-radius:16px;padding:16px;margin-bottom:14px}.hero{display:flex;justify-content:space-between;gap:14px;align-items:center;background:linear-gradient(135deg,rgba(125,211,216,.16),rgba(244,207,87,.09))}.hero p{margin:0 0 4px;color:var(--primary);font-size:11px;text-transform:uppercase;letter-spacing:2px;font-weight:700}.hero h1{font-family:'Bebas Neue';font-size:44px;line-height:.95;letter-spacing:1.2px;margin:0}.hero span,.section-sub{color:var(--muted);font-size:12px}.quick-links{display:flex;gap:8px;flex-wrap:wrap}.quick-links a,a{color:#061315;background:var(--primary);padding:10px 12px;border-radius:999px;text-decoration:none;font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:1px}.grid{display:grid;grid-template-columns:1fr;gap:14px;padding:0;background:transparent;border:0}h2{font-family:'Oswald';font-size:18px;margin:0 0 12px}.line-grid,.roster-grid{display:grid;gap:8px}.line-card,.player,.practice-card{background:var(--panel2);border:1px solid var(--border);border-radius:12px;padding:10px}.line-card strong,.player strong{color:var(--primary);margin-right:8px}.line-card span,.player span,.practice-card span{color:var(--text);font-size:12px}.player em{display:block;color:var(--muted);font-size:10px;margin-top:3px}.stat-summary{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px}.stat-summary div{background:var(--panel2);border:1px solid var(--border);border-radius:12px;padding:10px;text-align:center}.stat-summary strong{display:block;font-family:'Bebas Neue';color:var(--primary);font-size:28px}.stat-summary span{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:1px}.table-wrap{overflow:auto}table{width:100%;border-collapse:collapse;font-size:12px}th,td{border-bottom:1px solid var(--border);padding:8px;text-align:left}th{color:var(--muted);font-size:10px;text-transform:uppercase}.empty,.error{color:var(--muted);font-size:13px;line-height:1.5}.practice-card strong{display:block;color:var(--text)}details{margin-top:8px;color:var(--muted)}summary{cursor:pointer;color:var(--primary)}details p{font-size:12px;line-height:1.4}@media(min-width:760px){.grid{grid-template-columns:1fr 1fr}.roster-grid{grid-template-columns:repeat(3,1fr)}}@media(max-width:600px){.hero{display:block}.quick-links{margin-top:12px}.hero h1{font-size:34px}}
</style>
</head>
<body>
<header class="top"><div class="brand"><div class="logo" id="portalLogo">BB</div><div><strong id="portalTeamName">BenchBoss</strong><span id="portalOrgName">Parent Portal</span></div></div><a href="./app.html">Coach App</a></header>
<main id="parentPortalMount"><section class="empty">Loading team portal...</section></main>
<script type="module" src="./src/features/team-hub/parent-portal.js"></script>
</body>
</html>
